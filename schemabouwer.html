<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0e13">
<title>Schemabouwer — alleen voor Robin</title>
<style>
:root{--bg:#0b0e13;--card:#171c24;--card2:#1e242e;--line:#232a35;--gold:#c9a962;--goldsoft:#e0c98f;--wit:#f5f4f1;--grijs:#9aa1ab;--groen:#5dca85;--rood:#e08a6d}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--wit);font-family:system-ui,-apple-system,sans-serif;font-size:16px;line-height:1.5;padding-bottom:40px}
.wrap{max-width:720px;margin:0 auto;padding:max(14px,env(safe-area-inset-top)) 14px 14px}
header{text-align:center;padding:16px 0 6px}
header h1{font-size:19px;font-weight:800}
header h1 span{color:var(--gold)}
header p{font-size:12.5px;color:var(--grijs)}
.prive{background:rgba(224,138,109,.1);border:1px solid rgba(224,138,109,.4);color:var(--rood);font-size:12.5px;font-weight:700;padding:9px 12px;border-radius:10px;margin:10px 0 16px;text-align:center}
h2{font-size:16px;font-weight:800;margin:18px 0 10px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
button{font-family:inherit;border:none;cursor:pointer;border-radius:10px;font-weight:700;font-size:15px;transition:transform .12s ease}
button:active{transform:scale(.97)}
.btn{background:var(--gold);color:#0b0e13;padding:13px 20px;width:100%}
.btn-lijn{background:transparent;border:1px solid var(--line);color:var(--wit);padding:11px 18px;width:100%}
.btn-klein{background:var(--line);color:var(--wit);padding:8px 14px;font-size:13px;width:auto}
.btn-mini{background:var(--line);color:var(--wit);padding:5px 10px;font-size:13px;width:auto;border-radius:8px}
.verwijder{background:none;color:var(--rood);font-size:18px;padding:4px 8px;width:auto}
input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:11px 13px;color:var(--wit);font-family:inherit;font-size:16px;outline:none}
input:focus,select:focus{border-color:var(--gold)}
label{display:block;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--grijs);margin:12px 0 6px}
.rij{display:flex;gap:8px;align-items:center}
.rij>input,.rij>select{min-width:0}
.oefrij{display:flex;gap:6px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}
.oefrij:last-of-type{border-bottom:none}
.oefrij .n{flex:1;font-size:14.5px;min-width:0}
.oefrij .rng{width:74px;flex-shrink:0;padding:6px 8px;font-size:13px;text-align:center}
.leeg{color:var(--grijs);font-size:13.5px;padding:10px 0}
.klantbalk{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px}
.klantbalk button{flex-shrink:0;background:var(--card2);color:var(--wit);padding:8px 14px;font-size:13px;border:1px solid var(--line)}
.klantbalk button.aan{background:var(--gold);color:#0b0e13;border-color:var(--gold)}
#uitvoer{background:var(--bg);border:1px dashed var(--line);border-radius:10px;padding:12px;font-size:12px;color:var(--grijs);word-break:break-all;margin-top:10px;display:none}
#uitvoer.aan{display:block}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:24px;background:rgba(30,36,46,.97);border:1px solid var(--line);padding:13px 18px;border-radius:14px;font-size:14.5px;font-weight:600;box-shadow:0 12px 34px rgba(0,0,0,.5);z-index:100;animation:in .3s}
@keyframes in{from{opacity:0;transform:translate(-50%,14px)}to{opacity:1;transform:translateX(-50%)}}
.setknop{display:flex;align-items:center;gap:4px;flex-shrink:0}
.setknop b{font-size:13px;color:var(--goldsoft);min-width:22px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>Schema<span>bouwer</span></h1>
  <p>Maak een trainingsschema en stuur het als link naar je klant</p>
</header>
<div class="prive">Alleen voor jou — deel deze pagina niet met klanten</div>

<div class="klantbalk" id="klantbalk"></div>

<div class="card">
  <label style="margin-top:0">Voor wie is dit schema?</label>
  <div class="rij">
    <input type="text" id="klant" placeholder="Voornaam van je klant" oninput="stel.klant=this.value">
    <button class="btn-klein" onclick="bewaarConcept()">Bewaren</button>
  </div>
</div>

<div id="dagen"></div>

<div class="card">
  <label style="margin-top:0">Nieuwe trainingsdag</label>
  <div class="rij"><input type="text" id="nieuwedag" placeholder="bv. Push 1, Benen, Lopen A" onkeydown="if(event.key==='Enter')nieuweDag()"><button class="btn-klein" onclick="nieuweDag()">+</button></div>
</div>

<h2>Versturen naar je klant</h2>
<div class="card">
  <p style="font-size:13.5px;color:var(--grijs);margin-bottom:12px">De link bevat het volledige schema. Je klant tikt erop en krijgt de vraag of hij het wil laden. Zijn gelogde trainingen blijven altijd bewaard.</p>
  <button class="btn" onclick="deel()" style="margin-bottom:8px">Link maken en delen</button>
  <button class="btn-lijn" onclick="kopieer()">Alleen de code kopiëren</button>
  <div id="uitvoer"></div>
</div>

<div class="card">
  <label style="margin-top:0">Bestaand schema inladen om aan te passen</label>
  <div class="rij"><input type="text" id="inlees" placeholder="Plak een link of code"><button class="btn-klein" onclick="leesIn()">Laden</button></div>
</div>
</div>

<script>

["Glute kickback cable","Been van onder je lichaam naar achter strekken tot je bil volledig samentrekt. De beweging komt uit je heup, je onderrug beweegt niet."],

["Sumo deadlift","Brede stand, tenen naar buiten. Van de grond tot volledig rechtop, knieën volgen de tenen."]],

["Standing calf raises","Laat je hielen zo diep mogelijk zakken en pauzeer daar 1 tel. Duw dan zo hoog mogelijk op je tenen. Niet veren."],

["Plank","Eén rechte lijn van hoofd tot hielen, buik en billen aangespannen. Hier is geen beweging: de oefening is de lijn vasthouden."],

"Thuis · banden & lichaamsgewicht":[

["Sissy squat (tegen muur)","Houd je vast aan een deurpost of muur, leun achterover en buig de knieën naar voor terwijl je heupen gestrekt blijven. Diep quadricepswerk, klein bereik opbouwen."],

["Zwemmen","Techniek eerst, tempo later. Noteer je minuten en meters, rust gerust tussen de intervallen."],
["Roeien","Lange halen, de benen doen het werk. Goed alternatief voor lopen bij blessures."],
["Hyrox-blok","Stations afgewisseld met loopblokken, bijvoorbeeld 1 km lopen, sled, 1 km, wall balls. Train vooral de overgangen."],
["Wandelen","Telt ook. Stevig doorstappen, ideaal op rustdagen of met de kinderwagen."]]
};
const TOP=["Bankdrukken","Incline dumbbell press","Cable fly","Lat pulldown","Cable row","Shoulder press machine","Cable lateral raise","Reverse pec deck","Incline hammer curl","Bayesian curl","Overhead triceps extension","Triceps pushdown","Squat","Leg press","Romanian deadlift","Seated leg curl","Hip thrust","Standing calf raises","Cable crunch","Leg raises"];
function isCardio(oef){return BIB["Conditie · Lopen & meer"].some(x=>x[0]===oef)}
function standaardRange(oef){
  if(isCardio(oef))return '';
  const iso=['raise','curl','fly','pushdown','extension','pec deck','calf','crunch','abdominal','kickback','abductor','pallof','lateral','pullover','face pull'];
  const l=oef.toLowerCase();
  return iso.some(w=>l.includes(w))?'8-12':'4-8';
}
function alleGroepen(){const g={};Object.keys(BIB).forEach(k=>g[k]=BIB[k].map(x=>x[0]));return g}

let stel=JSON.parse(localStorage.getItem('sb_huidig')||'null')||{klant:'',dagen:[]};
let concepten=JSON.parse(localStorage.getItem('sb_concepten')||'{}');

function bewaarLokaal(){localStorage.setItem('sb_huidig',JSON.stringify(stel))}
function toast(t){const e=document.createElement('div');e.className='toast';e.textContent=t;document.body.appendChild(e);setTimeout(()=>e.remove(),2400)}

function bewaarConcept(){
  if(!stel.klant.trim()){toast('Vul eerst een naam in');return}
  concepten[stel.klant.trim()]=JSON.parse(JSON.stringify(stel));
  localStorage.setItem('sb_concepten',JSON.stringify(concepten));
  renderKlanten();toast('Bewaard voor '+stel.klant);
}
function laadConcept(n){stel=JSON.parse(JSON.stringify(concepten[n]));bewaarLokaal();render();toast('Schema van '+n+' geladen')}
function wisConcept(n){delete concepten[n];localStorage.setItem('sb_concepten',JSON.stringify(concepten));renderKlanten()}
function renderKlanten(){
  const el=document.getElementById('klantbalk');
  const namen=Object.keys(concepten);
  el.innerHTML=namen.length?namen.map(n=>`<button class="${n===stel.klant?'aan':''}" onclick="laadConcept('${n.replace(/'/g,"")}')">${n}</button>`).join('')+`<button onclick="nieuwSchema()">+ nieuw</button>`:'';
}
function nieuwSchema(){stel={klant:'',dagen:[]};bewaarLokaal();render();}

function nieuweDag(){
  const v=document.getElementById('nieuwedag').value.trim();if(!v)return;
  stel.dagen.push({naam:v,oefs:[]});
  document.getElementById('nieuwedag').value='';
  bewaarLokaal();render();
}
function wisDag(i){stel.dagen.splice(i,1);bewaarLokaal();render()}
function voegOef(i){
  const sel=document.getElementById('kies'+i);if(!sel.value)return;
  stel.dagen[i].oefs.push({n:sel.value,s:isCardio(sel.value)?1:3,r:standaardRange(sel.value)});
  sel.value='';bewaarLokaal();render();
}
function wisOef(i,j){stel.dagen[i].oefs.splice(j,1);bewaarLokaal();render()}
function schuif(i,j,d){
  const a=stel.dagen[i].oefs;const n=j+d;if(n<0||n>=a.length)return;
  [a[j],a[n]]=[a[n],a[j]];bewaarLokaal();render();
}
function sets(i,j,d){
  const o=stel.dagen[i].oefs[j];
  o.s=Math.max(1,Math.min(8,(o.s||3)+d));bewaarLokaal();render();
}
function zetRange(i,j,v){stel.dagen[i].oefs[j].r=v.trim();bewaarLokaal()}
function zetNaam(i,v){stel.dagen[i].naam=v.trim();bewaarLokaal()}

function render(){
  document.getElementById('klant').value=stel.klant||'';
  const groepen=alleGroepen();
  const opties='<option value="">— kies oefening —</option>'+Object.keys(groepen).map(g=>`<optgroup label="${g}">`+groepen[g].map(o=>`<option value="${o}">${TOP.includes(o)?'* ':''}${o}</option>`).join('')+'</optgroup>').join('');
  document.getElementById('dagen').innerHTML=stel.dagen.map((d,i)=>`
    <div class="card">
      <div class="rij" style="margin-bottom:8px">
        <input type="text" value="${d.naam}" oninput="zetNaam(${i},this.value)" style="font-weight:800;border:none;background:none;padding:4px 0;font-size:16px">
        <button class="verwijder" onclick="wisDag(${i})">&times;</button>
      </div>
      ${d.oefs.length?d.oefs.map((o,j)=>`
        <div class="oefrij">
          <span class="n">${o.n}</span>
          ${isCardio(o.n)?'':`<div class="setknop"><button class="btn-mini" onclick="sets(${i},${j},-1)">&minus;</button><b>${o.s}&times;</b><button class="btn-mini" onclick="sets(${i},${j},1)">+</button></div>
          <input class="rng" value="${o.r||''}" placeholder="8-12" onchange="zetRange(${i},${j},this.value)">`}
          <button class="btn-mini" onclick="schuif(${i},${j},-1)">&uarr;</button>
          <button class="btn-mini" onclick="schuif(${i},${j},1)">&darr;</button>
          <button class="verwijder" onclick="wisOef(${i},${j})">&times;</button>
        </div>`).join(''):'<div class="leeg">Nog geen oefeningen</div>'}
      <div class="rij" style="margin-top:10px">
        <select id="kies${i}">${opties}</select>
        <button class="btn-klein" onclick="voegOef(${i})">+</button>
      </div>
    </div>`).join('');
  renderKlanten();
}

/* zelfde inpakformaat als de TrainLog */
function pakIn(o){return btoa(unescape(encodeURIComponent(JSON.stringify(o)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}
function pakUit(t){t=t.replace(/-/g,'+').replace(/_/g,'/');return JSON.parse(decodeURIComponent(escape(atob(t))))}
function maakCode(){
  const r={};
  stel.dagen.forEach(d=>d.oefs.forEach(o=>{if(o.r)r[o.n]=o.r}));
  return pakIn({v:1,d:stel.dagen.map(d=>({n:d.naam,o:d.oefs.map(o=>o.n),s:d.oefs.map(o=>o.s||1)})),r:r});
}
function maakLink(){return location.origin+location.pathname.replace(/[^/]*$/,'')+'trainlog.html#s='+maakCode()}
async function deel(){
  if(!stel.dagen.length){toast('Voeg eerst een trainingsdag toe');return}
  const link=maakLink();
  const tekst=(stel.klant?'Hey '+stel.klant+', ':'')+'hier is je trainingsschema. Open de link in TrainLog:\n'+link;
  if(navigator.share){try{await navigator.share({title:'Trainingsschema',text:tekst});return}catch(e){}}
  try{await navigator.clipboard.writeText(tekst);toast('Bericht gekopieerd — plak in WhatsApp')}
  catch(e){toonUit(link)}
}
async function kopieer(){
  if(!stel.dagen.length){toast('Voeg eerst een trainingsdag toe');return}
  const c=maakCode();
  try{await navigator.clipboard.writeText(c);toast('Code gekopieerd')}catch(e){toonUit(c)}
}
function toonUit(t){const e=document.getElementById('uitvoer');e.textContent=t;e.classList.add('aan')}
function leesIn(){
  const ruw=document.getElementById('inlees').value.trim();if(!ruw)return;
  const code=ruw.includes('#s=')?ruw.split('#s=')[1]:ruw;
  try{
    const p=pakUit(code);
    if(!p||!Array.isArray(p.d))throw 0;
    stel.dagen=p.d.map(x=>({naam:x.n,oefs:x.o.map((o,i)=>({n:o,s:(x.s&&x.s[i])||3,r:(p.r&&p.r[o])||standaardRange(o)}))}));
    bewaarLokaal();render();document.getElementById('inlees').value='';toast('Schema ingeladen');
  }catch(e){toast('Deze code klopt niet')}
}
render();
</script>
</body>

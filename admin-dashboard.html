<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#0b0e13">
<title>Coachdashboard — Robin Verdonck Coaching</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
tailwind.config={
  theme:{extend:{colors:{
    obsidian:'#0b0e13',slate:'#12161d',kaart:'#171c24',kaart2:'#1e242e',lijn:'#232a35',
    gold:'#c9a962',goldsoft:'#e0c98f',wit:'#f5f4f1',grijs:'#9aa1ab',
    groen:'#5dca85',oranje:'#e0b05d',rood:'#e08a6d'
  },fontFamily:{sans:['system-ui','-apple-system','Segoe UI','sans-serif']}}}
};
</script>
<style>
  html,body{background:#0b0e13}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:#232a35;border-radius:9px}
  .knip{animation:knip 1.6s ease-in-out infinite}
  @keyframes knip{0%,100%{opacity:1}50%{opacity:.45}}
  .inschuif{animation:inschuif .3s cubic-bezier(.22,.61,.36,1)}
  @keyframes inschuif{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  input,select,textarea{color-scheme:dark}
</style>
</head>
<body class="bg-obsidian text-wit font-sans min-h-screen">

<!-- ============ INLOGGEN ============ -->
<div id="inlogscherm" class="hidden fixed inset-0 z-50 bg-obsidian flex items-center justify-center p-5">
  <div class="w-full max-w-sm">
    <div class="text-center mb-7">
      <div class="text-2xl font-extrabold">Coach<span class="text-gold">dashboard</span></div>
      <p class="text-grijs text-sm mt-1">Robin Verdonck Coaching</p>
    </div>
    <div class="bg-kaart border border-lijn rounded-2xl p-6">
      <label class="block text-[11px] font-bold uppercase tracking-wider text-grijs mb-2">E-mailadres</label>
      <input id="loginmail" type="email" autocomplete="username"
        class="w-full bg-obsidian border border-lijn rounded-xl px-4 py-3 text-wit outline-none focus:border-gold mb-4">
      <label class="block text-[11px] font-bold uppercase tracking-wider text-grijs mb-2">Wachtwoord</label>
      <input id="loginpw" type="password" autocomplete="current-password"
        class="w-full bg-obsidian border border-lijn rounded-xl px-4 py-3 text-wit outline-none focus:border-gold mb-5"
        onkeydown="if(event.key==='Enter')inloggen()">
      <button onclick="inloggen()" id="loginknop"
        class="w-full bg-gold text-obsidian font-bold rounded-xl py-3 active:scale-[.98] transition">Inloggen</button>
      <p id="loginfout" class="hidden text-rood text-sm mt-3 text-center"></p>
    </div>
    <p class="text-grijs text-xs text-center mt-4">Alleen voor de coach. Klantgegevens zijn afgeschermd.</p>
  </div>
</div>

<!-- ============ DASHBOARD ============ -->
<div id="dashboard" class="hidden">

  <header class="sticky top-0 z-30 bg-obsidian/95 backdrop-blur border-b border-lijn">
    <div class="max-w-6xl mx-auto px-4 pt-[max(12px,env(safe-area-inset-top))] pb-3">
      <div class="flex items-center justify-between gap-3">
        <div>
          <div class="text-lg font-extrabold leading-tight">Coach<span class="text-gold">dashboard</span></div>
          <div class="text-[11px] text-grijs" id="ingelogdals"></div>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="laadKlanten()" title="Vernieuwen"
            class="w-9 h-9 rounded-xl border border-lijn text-grijs hover:text-goldsoft hover:border-gold/60 transition flex items-center justify-center">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12a9 9 0 11-3-6.7M21 3v6h-6"/></svg>
          </button>
          <button onclick="uitloggen()" title="Uitloggen"
            class="w-9 h-9 rounded-xl border border-lijn text-grijs hover:text-rood hover:border-rood/60 transition flex items-center justify-center">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          </button>
        </div>
      </div>

      <!-- tellers -->
      <div class="grid grid-cols-4 gap-2 mt-3">
        <button onclick="zetFilter('alle')" data-filter="alle"
          class="filterknop bg-kaart border border-lijn rounded-xl px-2 py-2 text-left transition">
          <div class="text-lg font-extrabold leading-none" id="telAlle">0</div>
          <div class="text-[10px] uppercase tracking-wider text-grijs mt-1">Actief</div>
        </button>
        <button onclick="zetFilter('chaos')" data-filter="chaos"
          class="filterknop bg-kaart border border-lijn rounded-xl px-2 py-2 text-left transition">
          <div class="text-lg font-extrabold leading-none text-rood" id="telChaos">0</div>
          <div class="text-[10px] uppercase tracking-wider text-grijs mt-1">Noodknop</div>
        </button>
        <button onclick="zetFilter('afloop')" data-filter="afloop"
          class="filterknop bg-kaart border border-lijn rounded-xl px-2 py-2 text-left transition">
          <div class="text-lg font-extrabold leading-none text-oranje" id="telAfloop">0</div>
          <div class="text-[10px] uppercase tracking-wider text-grijs mt-1">Loopt af</div>
        </button>
        <button onclick="zetFilter('stil')" data-filter="stil"
          class="filterknop bg-kaart border border-lijn rounded-xl px-2 py-2 text-left transition">
          <div class="text-lg font-extrabold leading-none text-oranje" id="telStil">0</div>
          <div class="text-[10px] uppercase tracking-wider text-grijs mt-1">Stil</div>
        </button>
      </div>

      <!-- zoeken en toevoegen -->
      <div class="flex gap-2 mt-3">
        <div class="relative flex-1">
          <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-grijs" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input id="zoek" oninput="tekenLijst()" placeholder="Zoek op naam of e-mail"
            class="w-full bg-kaart border border-lijn rounded-xl pl-9 pr-3 py-2.5 text-sm outline-none focus:border-gold">
        </div>
        <button onclick="openFormulier()"
          class="bg-gold text-obsidian font-bold rounded-xl px-4 py-2.5 text-sm whitespace-nowrap active:scale-[.98] transition">
          + Klant
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-5">
    <div id="melding" class="hidden mb-4 rounded-xl border px-4 py-3 text-sm"></div>
    <div id="laden" class="text-center py-16 text-grijs text-sm">Klanten laden…</div>
    <div id="leeg" class="hidden text-center py-16">
      <div class="text-grijs text-sm">Nog geen klanten. Voeg je eerste klant toe met de knop hierboven.</div>
    </div>
    <div id="lijst" class="grid gap-3 sm:grid-cols-2 lg:grid-cols-3"></div>
  </main>
</div>

<!-- ============ FORMULIER ============ -->
<div id="formulierlaag" class="hidden fixed inset-0 z-40 bg-black/60 backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-5">
  <div class="bg-kaart border border-lijn w-full sm:max-w-lg rounded-t-2xl sm:rounded-2xl p-5 pb-[calc(20px+env(safe-area-inset-bottom))] max-h-[92vh] overflow-y-auto inschuif">
    <div class="w-10 h-1 bg-lijn rounded-full mx-auto mb-4 sm:hidden"></div>
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-extrabold" id="formtitel">Nieuwe klant</h2>
      <button onclick="sluitFormulier()" class="text-grijs hover:text-wit text-2xl leading-none px-2">&times;</button>
    </div>

    <input type="hidden" id="f_id">
    <label class="block text-[11px] font-bold uppercase tracking-wider text-grijs mb-1.5">Naam</label>
    <input id="f_naam" class="w-full bg-obsidian border border-lijn rounded-xl px-4 py-3 outline-none focus:border-gold mb-3" placeholder="Voornaam en naam">

    <label class="block text-[11px] font-bold uppercase tracking-wider text-grijs mb-1.5">E-mailadres</label>
    <input id="f_email" type="email" class="w-full bg-obsidian border border-lijn rounded-xl px-4 py-3 outline-none focus:border-gold mb-3" placeholder="naam@voorbeeld.be">

    <div class="grid grid-cols-2 gap-3 mb-3">
      <div>
        <label class="block text-[11px] font-bold uppercase tracking-wider text-grijs mb-1.5">Startdatum</label>
        <input id="f_start" type="date" class="w-full bg-obsidian border border-lijn rounded-xl px-4 py-3 outline-none focus:border-gold">
      </div>
      <div>
        <label class="block text-[11px] font-bold uppercase tracking-wider text-grijs mb-1.5">Duur (weken)</label>
        <input id="f_weken" type="number" min="1" max="52" value="12" class="w-full bg-obsidian border border-lijn rounded-xl px-4 py-3 outline-none focus:border-gold">
      </div>
    </div>

    <label class="block text-[11px] font-bold uppercase tracking-wider text-grijs mb-1.5">Link naar voedingsschema (pdf)</label>
    <input id="f_pdf" class="w-full bg-obsidian border border-lijn rounded-xl px-4 py-3 outline-none focus:border-gold mb-3" placeholder="https://…">

    <label class="block text-[11px] font-bold uppercase tracking-wider text-grijs mb-1.5">Notitie</label>
    <textarea id="f_notitie" rows="2" class="w-full bg-obsidian border border-lijn rounded-xl px-4 py-3 outline-none focus:border-gold mb-4 resize-y" placeholder="Doel, aandachtspunten…"></textarea>

    <p id="formfout" class="hidden text-rood text-sm mb-3"></p>

    <div class="flex gap-2">
      <button onclick="sluitFormulier()" class="flex-1 border border-lijn rounded-xl py-3 font-bold text-wit active:scale-[.98] transition">Annuleren</button>
      <button onclick="bewaarKlant()" id="bewaarknop" class="flex-1 bg-gold text-obsidian rounded-xl py-3 font-bold active:scale-[.98] transition">Bewaren</button>
    </div>
    <button onclick="archiveerKlant()" id="archiefknop" class="hidden w-full mt-2 border border-rood/40 text-rood rounded-xl py-2.5 text-sm font-bold active:scale-[.98] transition">Klant archiveren</button>
  </div>
</div>

<!-- ============ TOAST ============ -->
<div id="toasts" class="fixed left-0 right-0 bottom-5 z-50 flex flex-col items-center gap-2 pointer-events-none px-4"></div>

<script>
/* ==========================================================
   1. SUPABASE-CONFIGURATIE — vul deze twee waarden in
   ========================================================== */
const SUPABASE_URL     = 'https://JOUWPROJECT.supabase.co';
const SUPABASE_ANON_KEY = 'JOUW_ANON_KEY';

/* Basis-URL van je website, voor de klantlink */
const BASIS_URL = 'https://robinverdonck.be/';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ==========================================================
   2. HULPMIDDELEN
   ========================================================== */
const $ = id => document.getElementById(id);
const DAG = 86400000;

function toast(tekst, soort){
  const el = document.createElement('div');
  el.className = 'pointer-events-auto rounded-xl px-4 py-3 text-sm font-semibold shadow-2xl border inschuif ' +
    (soort === 'fout'
      ? 'bg-rood/15 border-rood/50 text-rood'
      : 'bg-kaart border-lijn text-wit');
  el.textContent = tekst;
  $('toasts').appendChild(el);
  setTimeout(() => { el.style.transition = 'opacity .3s'; el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 2600);
}

function toonMelding(tekst, soort){
  const el = $('melding');
  if(!tekst){ el.classList.add('hidden'); return; }
  el.className = 'mb-4 rounded-xl border px-4 py-3 text-sm ' +
    (soort === 'fout' ? 'bg-rood/10 border-rood/45 text-rood' : 'bg-kaart border-lijn text-grijs');
  el.textContent = tekst;
  el.classList.remove('hidden');
}

function datumNL(d){
  if(!d) return '—';
  return new Date(d + 'T00:00:00').toLocaleDateString('nl-BE', { day:'numeric', month:'short', year:'numeric' });
}
function vandaagISO(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function veiligeURL(u){
  if(!u) return null;
  const s = String(u).trim();
  return /^https?:\/\//i.test(s) ? s : null;
}
function ontsnap(t){
  return String(t == null ? '' : t).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

/* Berekent voortgang binnen het contract */
function voortgang(klant){
  const start = new Date(klant.start_date + 'T00:00:00');
  const nu = new Date(); nu.setHours(0,0,0,0);
  const dagenBezig = Math.floor((nu - start) / DAG);
  const totaalDagen = (klant.duration_weeks || 12) * 7;
  const wekenBezig = Math.floor(dagenBezig / 7) + 1;
  const dagenResterend = totaalDagen - dagenBezig;
  return {
    dagenBezig,
    totaalDagen,
    wekenBezig: Math.max(1, Math.min(klant.duration_weeks || 12, wekenBezig)),
    dagenResterend,
    nogNietGestart: dagenBezig < 0,
    procent: Math.max(0, Math.min(100, Math.round(dagenBezig / totaalDagen * 100)))
  };
}

/* Dagen sinds de laatste log */
function stilteDagen(klant){
  if(!klant.last_log_at) return null;
  const nu = new Date(); nu.setHours(0,0,0,0);
  const laatst = new Date(klant.last_log_at); laatst.setHours(0,0,0,0);
  return Math.floor((nu - laatst) / DAG);
}

/* Bepaalt de status: rood bij noodknop, oranje bij aflopen of stilte, anders groen */
function statusVan(klant){
  if(klant.chaos_flag) return { kleur:'rood', label:'Noodknop ingedrukt', prioriteit:0 };
  const v = voortgang(klant);
  if(v.nogNietGestart) return { kleur:'grijs', label:'Start ' + datumNL(klant.start_date), prioriteit:4 };
  if(v.dagenResterend <= 0) return { kleur:'oranje', label:'Contract afgelopen', prioriteit:1 };
  const stil = stilteDagen(klant);
  if(stil !== null && stil >= 8) return { kleur:'oranje', label: stil + ' dagen niets gelogd', prioriteit:1 };
  if(v.dagenResterend <= 14) return { kleur:'oranje', label:'Nog ' + v.dagenResterend + ' dagen', prioriteit:2 };
  return { kleur:'groen', label:'Loopt goed', prioriteit:3 };
}

const KLEUREN = {
  rood:   { rand:'border-rood',      stip:'bg-rood',   tekst:'text-rood',   vlak:'bg-rood/10' },
  oranje: { rand:'border-oranje/60', stip:'bg-oranje', tekst:'text-oranje', vlak:'bg-oranje/10' },
  groen:  { rand:'border-lijn',      stip:'bg-groen',  tekst:'text-groen',  vlak:'bg-groen/10' },
  grijs:  { rand:'border-lijn',      stip:'bg-grijs',  tekst:'text-grijs',  vlak:'bg-kaart2' }
};

/* ==========================================================
   3. INLOGGEN
   ========================================================== */
async function controleerSessie(){
  const { data } = await sb.auth.getSession();
  if(data.session){
    $('inlogscherm').classList.add('hidden');
    $('dashboard').classList.remove('hidden');
    $('ingelogdals').textContent = data.session.user.email;
    laadKlanten();
  } else {
    $('dashboard').classList.add('hidden');
    $('inlogscherm').classList.remove('hidden');
  }
}
async function inloggen(){
  const email = $('loginmail').value.trim();
  const pw = $('loginpw').value;
  const fout = $('loginfout');
  fout.classList.add('hidden');
  if(!email || !pw){ fout.textContent = 'Vul je e-mailadres en wachtwoord in.'; fout.classList.remove('hidden'); return; }
  const knop = $('loginknop');
  knop.disabled = true; knop.textContent = 'Bezig…';
  const { error } = await sb.auth.signInWithPassword({ email, password: pw });
  knop.disabled = false; knop.textContent = 'Inloggen';
  if(error){ fout.textContent = 'Inloggen mislukt: ' + error.message; fout.classList.remove('hidden'); return; }
  $('loginpw').value = '';
  controleerSessie();
}
async function uitloggen(){
  await sb.auth.signOut();
  klanten = [];
  controleerSessie();
}

/* ==========================================================
   4. KLANTEN LADEN EN TONEN
   ========================================================== */
let klanten = [];
let filter = 'alle';

async function laadKlanten(){
  $('laden').classList.remove('hidden');
  $('leeg').classList.add('hidden');
  toonMelding('');
  const { data, error } = await sb
    .from('clients')
    .select('*')
    .eq('active', true)
    .order('chaos_flag', { ascending: false })
    .order('start_date', { ascending: true });

  $('laden').classList.add('hidden');

  if(error){
    toonMelding('Kon de klanten niet ophalen: ' + error.message + '. Controleer je Supabase-instellingen en de tabel "clients".', 'fout');
    klanten = [];
    tekenLijst();
    return;
  }
  klanten = data || [];
  tekenTellers();
  tekenLijst();
}

function tekenTellers(){
  const chaos  = klanten.filter(k => k.chaos_flag).length;
  const afloop = klanten.filter(k => { const v = voortgang(k); return !v.nogNietGestart && v.dagenResterend <= 14; }).length;
  const stil   = klanten.filter(k => { const s = stilteDagen(k); return s !== null && s >= 8; }).length;
  $('telAlle').textContent   = klanten.length;
  $('telChaos').textContent  = chaos;
  $('telAfloop').textContent = afloop;
  $('telStil').textContent   = stil;
  $('telChaos').parentElement.classList.toggle('border-rood', chaos > 0);
  $('telChaos').parentElement.classList.toggle('knip', chaos > 0);
}

function zetFilter(f){
  filter = f;
  document.querySelectorAll('.filterknop').forEach(b => {
    const aan = b.dataset.filter === f;
    b.classList.toggle('border-gold', aan);
    b.classList.toggle('bg-kaart2', aan);
  });
  tekenLijst();
}

function tekenLijst(){
  const zoek = $('zoek').value.trim().toLowerCase();
  let rij = klanten.slice();

  if(filter === 'chaos')  rij = rij.filter(k => k.chaos_flag);
  if(filter === 'afloop') rij = rij.filter(k => { const v = voortgang(k); return !v.nogNietGestart && v.dagenResterend <= 14; });
  if(filter === 'stil')   rij = rij.filter(k => { const s = stilteDagen(k); return s !== null && s >= 8; });
  if(zoek) rij = rij.filter(k =>
    (k.name || '').toLowerCase().includes(zoek) || (k.email || '').toLowerCase().includes(zoek));

  rij.sort((a,b) => statusVan(a).prioriteit - statusVan(b).prioriteit || (a.name||'').localeCompare(b.name||''));

  const el = $('lijst');
  if(!rij.length){
    el.innerHTML = '';
    $('leeg').classList.remove('hidden');
    $('leeg').querySelector('div').textContent = klanten.length
      ? 'Geen klanten die aan deze filter voldoen.'
      : 'Nog geen klanten. Voeg je eerste klant toe met de knop hierboven.';
    return;
  }
  $('leeg').classList.add('hidden');
  el.innerHTML = rij.map(kaart).join('');
}

function kaart(k){
  const st = statusVan(k);
  const kl = KLEUREN[st.kleur];
  const v  = voortgang(k);
  const pdf = veiligeURL(k.nutrition_pdf_url);
  const stil = stilteDagen(k);

  return `
  <article class="bg-kaart border ${kl.rand} rounded-2xl p-4 flex flex-col gap-3 ${k.chaos_flag ? 'ring-1 ring-rood/40' : ''}">
    <div class="flex items-start justify-between gap-3">
      <div class="min-w-0">
        <div class="font-extrabold text-[15px] truncate">${ontsnap(k.name)}</div>
        <div class="text-xs text-grijs truncate">${ontsnap(k.email || 'geen e-mailadres')}</div>
      </div>
      <span class="flex items-center gap-1.5 text-[11px] font-bold ${kl.tekst} whitespace-nowrap shrink-0">
        <span class="w-2 h-2 rounded-full ${kl.stip} ${k.chaos_flag ? 'knip' : ''}"></span>${ontsnap(st.label)}
      </span>
    </div>

    ${k.chaos_flag ? `
    <div class="rounded-xl ${kl.vlak} border border-rood/45 px-3 py-2.5">
      <div class="text-rood text-xs font-bold">Deze klant heeft de noodknop ingedrukt${k.chaos_at ? ' op ' + new Date(k.chaos_at).toLocaleDateString('nl-BE',{day:'numeric',month:'short'}) : ''}.</div>
      <div class="text-grijs text-[11px] mt-0.5">Bel of stuur een bericht voor je iets aanpast aan het schema.</div>
    </div>` : ''}

    <div>
      <div class="flex items-center justify-between text-[11px] text-grijs mb-1.5">
        <span>${v.nogNietGestart ? 'Start ' + datumNL(k.start_date) : 'Week ' + v.wekenBezig + ' van ' + (k.duration_weeks || 12)}</span>
        <span>${v.nogNietGestart ? '' : (v.dagenResterend > 0 ? v.dagenResterend + ' dagen resterend' : 'afgelopen')}</span>
      </div>
      <div class="h-1.5 bg-lijn rounded-full overflow-hidden">
        <div class="h-full rounded-full ${v.dagenResterend <= 14 ? 'bg-oranje' : 'bg-gold'}" style="width:${v.procent}%"></div>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-2 text-[11px]">
      <div class="bg-obsidian rounded-lg px-2.5 py-2">
        <div class="text-grijs">Gestart</div>
        <div class="font-bold mt-0.5">${datumNL(k.start_date)}</div>
      </div>
      <div class="bg-obsidian rounded-lg px-2.5 py-2">
        <div class="text-grijs">Laatste log</div>
        <div class="font-bold mt-0.5 ${stil !== null && stil >= 8 ? 'text-oranje' : ''}">${
          k.last_log_at ? (stil === 0 ? 'vandaag' : stil + ' dagen geleden') : 'nog niets'}</div>
      </div>
    </div>

    ${k.notes ? `<div class="text-[11px] text-grijs border-l-2 border-lijn pl-2.5">${ontsnap(k.notes)}</div>` : ''}

    <div class="flex flex-wrap gap-2 mt-auto pt-1">
      ${pdf ? `<a href="${ontsnap(pdf)}" target="_blank" rel="noopener"
        class="flex-1 min-w-[110px] text-center border border-gold/45 text-goldsoft rounded-lg py-2 text-xs font-bold hover:bg-gold/10 transition">Voedingsschema</a>`
      : `<span class="flex-1 min-w-[110px] text-center border border-lijn text-grijs/60 rounded-lg py-2 text-xs font-bold">Geen pdf</span>`}
      <button onclick="kopieerLink('${k.id}')"
        class="flex-1 min-w-[110px] border border-lijn rounded-lg py-2 text-xs font-bold hover:border-gold/60 hover:text-goldsoft transition">Kopieer link</button>
      ${k.chaos_flag ? `<button onclick="resetChaos('${k.id}')"
        class="w-full bg-rood text-obsidian rounded-lg py-2.5 text-xs font-extrabold active:scale-[.98] transition">Noodknop afhandelen</button>` : ''}
      <button onclick="openFormulier('${k.id}')"
        class="w-full border border-lijn rounded-lg py-2 text-xs font-bold text-grijs hover:text-wit transition">Bewerken</button>
    </div>
  </article>`;
}

/* ==========================================================
   5. ACTIES
   ========================================================== */
async function kopieerLink(id){
  const link = BASIS_URL + 'trainlog.html?client_id=' + id;
  try{
    await navigator.clipboard.writeText(link);
    toast('Link gekopieerd');
  }catch(e){
    const t = document.createElement('textarea');
    t.value = link; document.body.appendChild(t); t.select();
    try{ document.execCommand('copy'); toast('Link gekopieerd'); }
    catch(err){ toast('Kopiëren lukte niet', 'fout'); }
    t.remove();
  }
}

async function resetChaos(id){
  const k = klanten.find(x => x.id === id);
  if(!confirm('Noodknop afhandelen voor ' + (k ? k.name : 'deze klant') + '?\n\nDoe dit pas nadat je hem of haar gesproken hebt.')) return;
  const { error } = await sb.from('clients')
    .update({ chaos_flag:false, chaos_at:null, chaos_resolved_at:new Date().toISOString() })
    .eq('id', id);
  if(error){ toast('Niet gelukt: ' + error.message, 'fout'); return; }
  toast('Noodknop afgehandeld');
  laadKlanten();
}

/* ==========================================================
   6. FORMULIER
   ========================================================== */
function openFormulier(id){
  $('formfout').classList.add('hidden');
  const k = id ? klanten.find(x => x.id === id) : null;
  $('formtitel').textContent = k ? 'Klant bewerken' : 'Nieuwe klant';
  $('f_id').value      = k ? k.id : '';
  $('f_naam').value    = k ? (k.name || '') : '';
  $('f_email').value   = k ? (k.email || '') : '';
  $('f_start').value   = k ? (k.start_date || '') : vandaagISO();
  $('f_weken').value   = k ? (k.duration_weeks || 12) : 12;
  $('f_pdf').value     = k ? (k.nutrition_pdf_url || '') : '';
  $('f_notitie').value = k ? (k.notes || '') : '';
  $('archiefknop').classList.toggle('hidden', !k);
  $('formulierlaag').classList.remove('hidden');
  setTimeout(() => $('f_naam').focus(), 100);
}
function sluitFormulier(){ $('formulierlaag').classList.add('hidden'); }

async function bewaarKlant(){
  const fout = $('formfout');
  fout.classList.add('hidden');
  const naam  = $('f_naam').value.trim();
  const start = $('f_start').value;
  const weken = parseInt($('f_weken').value, 10);
  const pdf   = $('f_pdf').value.trim();

  if(!naam)  { fout.textContent = 'Vul een naam in.'; fout.classList.remove('hidden'); return; }
  if(!start) { fout.textContent = 'Vul een startdatum in.'; fout.classList.remove('hidden'); return; }
  if(!weken || weken < 1 || weken > 52){ fout.textContent = 'De duur moet tussen 1 en 52 weken liggen.'; fout.classList.remove('hidden'); return; }
  if(pdf && !veiligeURL(pdf)){ fout.textContent = 'De pdf-link moet met http:// of https:// beginnen.'; fout.classList.remove('hidden'); return; }

  const rij = {
    name: naam,
    email: $('f_email').value.trim() || null,
    start_date: start,
    duration_weeks: weken,
    nutrition_pdf_url: pdf || null,
    notes: $('f_notitie').value.trim() || null
  };

  const knop = $('bewaarknop');
  knop.disabled = true; knop.textContent = 'Bezig…';
  const id = $('f_id').value;
  const { error } = id
    ? await sb.from('clients').update(rij).eq('id', id)
    : await sb.from('clients').insert([{ ...rij, active:true, chaos_flag:false }]);
  knop.disabled = false; knop.textContent = 'Bewaren';

  if(error){ fout.textContent = 'Opslaan mislukt: ' + error.message; fout.classList.remove('hidden'); return; }
  sluitFormulier();
  toast(id ? 'Klant bijgewerkt' : 'Klant toegevoegd');
  laadKlanten();
}

async function archiveerKlant(){
  const id = $('f_id').value;
  if(!id) return;
  const k = klanten.find(x => x.id === id);
  if(!confirm('Archiveer ' + (k ? k.name : 'deze klant') + '?\n\nDe klant verdwijnt uit het overzicht maar de gegevens blijven bewaard.')) return;
  const { error } = await sb.from('clients').update({ active:false }).eq('id', id);
  if(error){ toast('Niet gelukt: ' + error.message, 'fout'); return; }
  sluitFormulier();
  toast('Klant gearchiveerd');
  laadKlanten();
}

/* ==========================================================
   7. START
   ========================================================== */
$('formulierlaag').addEventListener('click', e => { if(e.target === $('formulierlaag')) sluitFormulier(); });
addEventListener('keydown', e => { if(e.key === 'Escape') sluitFormulier(); });
sb.auth.onAuthStateChange(() => controleerSessie());
zetFilter('alle');
controleerSessie();
</script>
